---
name: lint

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: lint-${{ github.ref }}
  cancel-in-progress: true

jobs:
  shell:
    name: ShellCheck
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v7.0.0
        with:
          python-version: "3.13"

      - name: Install ShellCheck
        run: python -m pip install shellcheck-py==0.11.0.1

      - name: Run ShellCheck
        run: shellcheck scripts/*.sh

  ansible:
    name: Ansible
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v7.0.0
        with:
          python-version: "3.13"
          cache: "pip"

      - name: Install Python dependencies
        run: python -m pip install --requirement requirements.txt

      - name: Cache Ansible Galaxy collections
        uses: actions/cache@v6
        with:
          path: ~/.ansible/collections
          key: ansible-galaxy-${{ hashFiles('ansible/requirements.yml') }}

      - name: Install Ansible collections
        run: ansible-galaxy collection install --requirements-file ansible/requirements.yml

      - name: Check playbook syntax
        working-directory: ansible
        run: |
          ansible-playbook --syntax-check --inventory 'localhost,' playbooks/setup.yml
          ansible-playbook --syntax-check --inventory 'localhost,' playbooks/dotfiles.yml

      - name: Run Ansible lint
        run: ansible-lint --config-file ansible/.ansible-lint.yml ansible
