---
name: Release

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    name: Tag and release
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Create tag and release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG=$(date +%Y-%m-%d)
          COUNT=0
          FINAL_TAG="$TAG"

          while gh release view "$FINAL_TAG" &>/dev/null; do
            COUNT=$((COUNT + 1))
            FINAL_TAG="${TAG}-${COUNT}"
          done

          gh release create "$FINAL_TAG" \
            --title "$FINAL_TAG" \
            --notes "" \
            --latest
