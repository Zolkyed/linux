---
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-added-large-files
      - id: check-merge-conflict
      - id: check-yaml
        exclude: ^ansible/inventory/.*/vault\.yml$
      - id: end-of-file-fixer
      - id: trailing-whitespace

  - repo: local
    hooks:
      - id: check-vault-encrypted
        name: vault files must be SOPS-encrypted
        language: pygrep
        entry: "^sops:"
        args: [--negate]
        files: ^ansible/inventory/.*/vault\.yml$

  - repo: https://github.com/adrienverge/yamllint.git
    rev: v1.38.0
    hooks:
      - id: yamllint
        args: [-c, .yamllint]
        exclude: ^ansible/inventory/.*/vault\.yml$

  - repo: https://github.com/ansible/ansible-lint
    rev: v26.4.0
    hooks:
      - id: ansible-lint
        files: ^ansible/.*\.ya?ml$

  - repo: https://github.com/shellcheck-py/shellcheck-py
    rev: v0.11.0.1
    hooks:
      - id: shellcheck
        files: ^scripts/.*\.sh$
