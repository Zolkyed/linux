---
- name: Detect | Find desktop environment binaries
  ansible.builtin.stat:
    path: "{{ item.bin }}"
  loop: "{{ detect_environments }}"
  register: detect_de

- name: Detect | Resolve enabled features
  ansible.builtin.set_fact:
    enabled_features: >-
      {{ (enabled_features | default([])
          + (detect_de.results | selectattr('stat.exists') | map(attribute='item.feature') | list))
         | unique }}
