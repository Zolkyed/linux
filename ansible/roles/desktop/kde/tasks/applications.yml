---
- name: KDE | Ensure local data directory exists
  ansible.builtin.file:
    path: "{{ kde_dolphin_places_file | dirname }}"
    state: directory
    owner: "{{ user_name }}"
    group: "{{ user_name }}"
    mode: "0755"

- name: KDE | Deploy Dolphin places
  ansible.builtin.template:
    src: user-places.xbel.j2
    dest: "{{ kde_dolphin_places_file }}"
    owner: "{{ user_name }}"
    group: "{{ user_name }}"
    mode: "0644"
    validate: xmllint --noout %s

- name: KDE | Deploy Spotify playlist launchers
  ansible.builtin.template:
    src: spotify-playlist.desktop.j2
    dest: "{{ user_home }}/.local/share/applications/spotify-{{ item.id }}.desktop"
    owner: "{{ user_name }}"
    group: "{{ user_name }}"
    mode: "0644"
  loop:
    - id: manga
      name: Manga
      uri: "{{ kde_spotify_manga_uri }}"
    - id: quality
      name: Quality
      uri: "{{ kde_spotify_quality_uri }}"
    - id: creepy
      name: Creepy
      uri: "{{ kde_spotify_creepy_uri }}"
    - id: extra
      name: Extra
      uri: "{{ kde_spotify_extra_uri }}"
  loop_control:
    label: "{{ item.name }}"

- name: KDE | Configure terminal preference
  community.general.kdeconfig:
    path: "{{ user_home }}/.config/kdeglobals"
    values:
      - group: General
        key: TerminalApplication
        value: "{{ kde_terminal_command }}"
      - group: General
        key: TerminalService
        value: "{{ kde_terminal_desktop }}"
    owner: "{{ user_name }}"
    group: "{{ user_name }}"
    mode: "0644"
