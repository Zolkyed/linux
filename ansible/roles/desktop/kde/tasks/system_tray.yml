---
- name: KDE | Locate system tray applet IDs
  ansible.builtin.command:
    argv:
      - awk
      - >-
        /^\[Containments\]\[[0-9]+\]\[Applets\]\[[0-9]+\]$/ {
          group=$0;
          sub(/^\[Containments\]\[/, "", group);
          sub(/\]\[Applets\]\[/, " ", group);
          sub(/\]$/, "", group);
          ids=group;
          next;
        }
        /^plugin=org\.kde\.plasma\.systemtray$/ {
          print ids;
          exit;
        }
      - "{{ user_home }}/.config/plasma-org.kde.plasma.desktop-appletsrc"
  register: kde_system_tray_ids
  changed_when: false
  failed_when: false

- name: KDE | Remove malformed escaped system tray group
  ansible.builtin.replace:
    path: "{{ user_home }}/.config/plasma-org.kde.plasma.desktop-appletsrc"
    regexp: '\n?\[Containments\\x5d\\x5b[^\n]*Applets[^\n]*General[^\n]*\]\nhiddenItems=.*\n'
    replace: "\n"
    owner: "{{ user_name }}"
    group: "{{ user_name }}"
    mode: "0644"

- name: KDE | Read hidden system tray items
  ansible.builtin.command:
    argv:
      - kreadconfig6
      - --file
      - "{{ user_home }}/.config/plasma-org.kde.plasma.desktop-appletsrc"
      - --group
      - Containments
      - --group
      - "{{ kde_system_tray_ids.stdout.split()[0] }}"
      - --group
      - Applets
      - --group
      - "{{ kde_system_tray_ids.stdout.split()[1] }}"
      - --group
      - General
      - --key
      - hiddenItems
  become_user: "{{ user_name }}"
  environment:
    HOME: "{{ user_home }}"
  register: kde_system_tray_current_hidden_items
  changed_when: false
  failed_when: false
  when:
    - kde_system_tray_hidden_items | length > 0
    - kde_system_tray_ids.stdout.split() | length == 2

- name: KDE | Configure hidden system tray items
  ansible.builtin.command:
    argv:
      - kwriteconfig6
      - --file
      - "{{ user_home }}/.config/plasma-org.kde.plasma.desktop-appletsrc"
      - --group
      - Containments
      - --group
      - "{{ kde_system_tray_ids.stdout.split()[0] }}"
      - --group
      - Applets
      - --group
      - "{{ kde_system_tray_ids.stdout.split()[1] }}"
      - --group
      - General
      - --key
      - hiddenItems
      - "{{ kde_system_tray_hidden_items | join(',') }}"
  become_user: "{{ user_name }}"
  environment:
    HOME: "{{ user_home }}"
  when:
    - kde_system_tray_hidden_items | length > 0
    - kde_system_tray_ids.stdout.split() | length == 2
    - kde_system_tray_current_hidden_items.stdout | default('') != kde_system_tray_hidden_items | join(',')

- name: KDE | Ensure system tray config ownership
  ansible.builtin.file:
    path: "{{ user_home }}/.config/plasma-org.kde.plasma.desktop-appletsrc"
    owner: "{{ user_name }}"
    group: "{{ user_name }}"
    mode: "0644"
  when:
    - kde_system_tray_hidden_items | length > 0
    - kde_system_tray_ids.stdout.split() | length == 2
