---
- name: Virtualization | Install packages
  ansible.builtin.include_role:
    name: lib/packages
  vars:
    install_label: Virtualization
    install_pacman_packages: "{{ virtualization_pacman_packages }}"

- name: Virtualization | Reload firewalld to discover libvirt zones
  ansible.builtin.systemd_service:
    name: firewalld.service
    state: reloaded
  changed_when: false

- name: Virtualization | Enable and start libvirt sockets
  ansible.builtin.systemd_service:
    name: "{{ item }}"
    enabled: true
    state: started
  loop:
    - libvirtd.socket
    - libvirtd-admin.socket
    - libvirtd-ro.socket
    - virtlogd.socket

- name: Virtualization | Add user to virtualization groups
  ansible.builtin.user:
    name: "{{ user_name }}"
    groups:
      - libvirt
      - kvm
    append: true

- name: Virtualization | Enable default NAT network autostart
  community.libvirt.virt_net:
    name: default
    autostart: true

- name: Virtualization | Ensure default NAT network is active
  community.libvirt.virt_net:
    name: default
    state: active
