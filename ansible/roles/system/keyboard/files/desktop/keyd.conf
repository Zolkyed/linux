[ids]
*

[main]
capslock = noop
numlock = togglem(numpad, numlock)
kpenter = command(runuser -u charl -- /home/charl/.local/bin/find-phone.py)
kpplus = brightnessup
kpminus = brightnessdown
scrolllock = C-delete

[meta]
1 = M-f1
2 = M-f2
3 = M-f3
4 = M-f4

f1 = M-1
f2 = M-2
f3 = M-3
f4 = M-4

[meta+shift]
1 = M-S-f1
2 = M-S-f2
3 = M-S-f3
4 = M-S-f4

f1 = M-S-1
f2 = M-S-2
f3 = M-S-3
f4 = M-S-4

[numpad]
kp4 = command(runuser -u charl -- /home/charl/.local/bin/fan-toggle.py)
