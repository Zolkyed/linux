---
- name: Keyboard | Install packages
  ansible.builtin.include_role:
    name: lib/packages
  vars:
    install_label: Keyboard
    install_pacman_packages: "{{ keyboard_pacman_packages }}"

- name: Keyboard | Configure keyd
  ansible.builtin.copy:
    src: "{{ inventory_hostname }}/keyd.conf"
    dest: /etc/keyd/default.conf
    owner: root
    group: root
    mode: "0644"
  notify: Keyboard | Restart keyd

- name: Keyboard | Enable and start keyd
  ansible.builtin.systemd_service:
    name: keyd.service
    enabled: true
    state: started

- name: Keyboard | Add user to keyd group
  ansible.builtin.user:
    name: "{{ user_name }}"
    groups: keyd
    append: true

- name: Keyboard | Create user keyd config directory
  ansible.builtin.file:
    path: "{{ user_home }}/.config/keyd"
    state: directory
    owner: "{{ user_name }}"
    group: "{{ user_name }}"
    mode: "0755"
  when: inventory_hostname == "desktop"

- name: Keyboard | Configure application-specific mappings
  ansible.builtin.copy:
    src: desktop/keyd-app.conf
    dest: "{{ user_home }}/.config/keyd/app.conf"
    owner: "{{ user_name }}"
    group: "{{ user_name }}"
    mode: "0644"
  when: inventory_hostname == "desktop"

- name: Keyboard | Install programmer XKB symbols
  ansible.builtin.copy:
    src: us_programmer
    dest: /usr/share/X11/xkb/symbols/us_programmer
    owner: root
    group: root
    mode: "0644"

- name: Keyboard | Register programmer XKB layout
  community.general.xml:
    path: /usr/share/X11/xkb/rules/evdev.xml
    xpath: /xkbConfigRegistry/layoutList[not(layout/configItem/name='us_programmer')]
    add_children:
      - |
        <layout>
          <configItem>
            <name>us_programmer</name>
            <shortDescription>eng</shortDescription>
            <description>English (US, Programmer)</description>
            <languageList>
              <iso639Id>eng</iso639Id>
            </languageList>
          </configItem>
        </layout>
    input_type: xml
    pretty_print: true
