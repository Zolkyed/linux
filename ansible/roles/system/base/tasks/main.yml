---
- name: Base | Install packages
  ansible.builtin.include_role:
    name: lib/packages
  vars:
    install_label: Base
    install_pacman_packages: "{{ base_pacman_packages }}"
    install_aur_packages: "{{ base_aur_packages }}"

- name: Base | Enable and start system timers
  ansible.builtin.systemd_service:
    name: "{{ item }}"
    enabled: true
    state: started
  loop:
    - logrotate.timer
    - man-db.timer
