---
- name: Communication | Check Thunderbird profile
  ansible.builtin.stat:
    path: "{{ communication_thunderbird_profile_directory }}"
  register: communication_thunderbird_profile

- name: Communication | Require initialized Thunderbird profile
  ansible.builtin.assert:
    that:
      - communication_thunderbird_profile.stat.isdir | default(false)
    fail_msg: >-
      Thunderbird profile {{ communication_thunderbird_profile_directory }} does not exist.
      Start Thunderbird once or update communication_thunderbird_profile_directory.

- name: Communication | Configure Thunderbird accounts
  ansible.builtin.template:
    src: thunderbird/user.js.j2
    dest: "{{ communication_thunderbird_profile_directory }}/user.js"
    owner: "{{ user_name }}"
    group: "{{ user_name }}"
    mode: "0600"
