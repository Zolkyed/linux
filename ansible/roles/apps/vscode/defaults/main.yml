---
# Retry
vscode_retries: 3
vscode_retry_delay: 5

vscode_aur_packages:
  - visual-studio-code-bin

# Extensions
vscode_extensions:
  # Language support
  - redhat.ansible
  - ms-vscode.cpptools
  - wholroyd.jinja
  - ms-python.python
  - ms-pyright.pyright
  - charliermarsh.ruff
  - hashicorp.hcl
  - hashicorp.terraform
  # Tools
  - ms-azuretools.vscode-docker
  - ms-vscode-remote.remote-ssh
  - shipitsmarter.sops-edit
  - eamodio.gitlens
  - oderwat.indent-rainbow
  - esbenp.prettier-vscode
  - dbaeumer.vscode-eslint
  # Appearance
  - catppuccin.catppuccin-vsc
  - pkief.material-icon-theme
