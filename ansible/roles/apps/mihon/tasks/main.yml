---
- name: Mihon | Ensure applications directory exists
  ansible.builtin.file:
    path: "{{ user_home }}/.local/share/applications"
    state: directory
    owner: "{{ user_name }}"
    group: "{{ user_name }}"
    mode: "0755"

- name: Mihon | Ensure icons directory exists
  ansible.builtin.file:
    path: "{{ user_home }}/.local/share/icons"
    state: directory
    owner: "{{ user_name }}"
    group: "{{ user_name }}"
    mode: "0755"

- name: Mihon | Copy icon
  ansible.builtin.copy:
    src: "{{ mihon_icon_src }}"
    dest: "{{ mihon_icon_dest }}"
    owner: "{{ user_name }}"
    group: "{{ user_name }}"
    mode: "0644"

- name: Mihon | Deploy desktop entry
  ansible.builtin.template:
    src: mihon.desktop.j2
    dest: "{{ mihon_desktop_dest }}"
    owner: "{{ user_name }}"
    group: "{{ user_name }}"
    mode: "0644"
