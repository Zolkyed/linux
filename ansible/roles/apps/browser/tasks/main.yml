---
- name: Browser | Install packages
  ansible.builtin.include_role:
    name: lib/packages
  vars:
    install_label: Browser
    install_aur_packages: "{{ browser_aur_packages }}"

- name: Browser | Ensure local extension directories exist
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: "{{ user_name }}"
    group: "{{ user_name }}"
    mode: "0755"
  loop:
    - "{{ browser_local_extensions_dir }}"
    - "{{ browser_flags_file | dirname }}"

- name: Browser | Deploy local extensions
  ansible.builtin.copy:
    src: "{{ item.src }}/"
    dest: "{{ item.path }}/"
    owner: "{{ user_name }}"
    group: "{{ user_name }}"
    mode: preserve
    directory_mode: "0755"
  loop: "{{ browser_local_extensions }}"
  loop_control:
    label: "{{ item.name }}"

- name: Browser | Load local extensions
  ansible.builtin.blockinfile:
    path: "{{ browser_flags_file }}"
    marker: "# {mark} ANSIBLE MANAGED LOCAL EXTENSIONS"
    block: >-
      --load-extension={{ browser_local_extensions |
      map(attribute='path') | join(',') }}
    create: true
    owner: "{{ user_name }}"
    group: "{{ user_name }}"
    mode: "0644"

- name: Browser | Configure Brave flags
  ansible.builtin.blockinfile:
    path: "{{ browser_flags_file }}"
    marker: "# {mark} ANSIBLE MANAGED BRAVE FLAGS"
    block: "{{ browser_flags | join('\n') }}"
    create: true
    owner: "{{ user_name }}"
    group: "{{ user_name }}"
    mode: "0644"

- name: Browser | Ensure managed policy directory exists
  ansible.builtin.file:
    path: "{{ browser_policy_dir }}"
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Browser | Deploy managed policy
  ansible.builtin.template:
    src: browser-policy.json.j2
    dest: "{{ browser_policy_dir }}/{{ browser_policy_file }}"
    owner: root
    group: root
    mode: "0644"
