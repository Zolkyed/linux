---
- name: Dev | Install packages
  ansible.builtin.include_role:
    name: lib/packages
  vars:
    install_label: Dev
    install_pacman_packages: "{{ dev_pacman_packages }}"
    install_aur_packages: "{{ dev_aur_packages }}"
    install_flatpak_packages: "{{ dev_flatpak_packages }}"
    install_uv_tools: "{{ dev_uv_tools }}"
    install_cargo_packages: "{{ dev_cargo_packages }}"
    install_go_packages: "{{ dev_go_packages }}"
