---
- name: Full system setup
  hosts: all
  become: true
  gather_facts: true

  pre_tasks:
    - name: Setup | Detect OS variant
      tags: always
      ansible.builtin.import_role:
        name: lib/os

    - name: Setup | Detect features
      tags: always
      ansible.builtin.import_role:
        name: lib/detect

    - name: Setup | Resolve user UID
      tags: always
      ansible.builtin.import_role:
        name: lib/user

    - name: Setup | Fully upgrade system packages
      tags: always
      community.general.pacman:
        update_cache: true
        upgrade: true

  roles:
    # system
    - role: system/pacman
      tags: pacman
    - role: system/rate_mirrors
      tags: rate_mirrors
      when: not os_is_cachyos
    - role: system/cachyos_repo
      tags: cachyos_repo
      when: not os_is_cachyos
    - role: system/cachyos_performance
      tags: cachyos_performance
      when: not os_is_cachyos
    - role: system/aur
      tags: aur
    - role: system/flatpak
      tags: flatpak
    - role: system/base
      tags: base
    - role: system/audio
      tags: audio
    - role: system/logging
      tags: logging
    - role: system/keyboard
      tags: keyboard
    - role: system/fingerprint
      tags: fingerprint
      when: "'fingerprint' in detect_enabled_features"
    - role: system/yubikey
      tags: yubikey
    - role: system/disk
      tags: disk
    - role: system/power
      tags: power
    - role: system/networking
      tags: networking
    - role: system/avahi
      tags: avahi
    - role: system/printing
      tags: printing
    - role: system/smb
      tags: smb
    - role: system/fonts
      tags: fonts
    - role: system/sshd
      tags: sshd
    - role: system/cockpit
      tags: cockpit
    - role: system/firewall
      tags: firewall
    - role: system/fail2ban
      tags: fail2ban
    - role: system/plymouth
      tags: plymouth
    - role: system/snapper
      tags: snapper
    - role: system/limine
      tags: limine
    - role: system/restic
      tags: restic
      when: "'restic' in detect_enabled_features"
    - role: system/vpn
      tags: vpn
      when: "'vpn' in detect_enabled_features"
    - role: system/docker
      tags: docker
    - role: system/virtualization
      tags: virtualization

    # desktop
    - role: desktop/gnome
      tags: gnome
      when: "'gnome' in detect_enabled_features"
    - role: desktop/kde
      tags: kde
      when: "'kde' in detect_enabled_features"

    # Apps
    - role: apps/mise
      tags: mise
    - role: apps/dev
      tags: dev
    - role: apps/ai
      tags: ai
    - role: apps/browser
      tags: browser
    - role: apps/gaming
      tags: gaming
      when: "'gaming' in detect_enabled_features"
    - role: apps/emulation
      tags: emulation
      when: "'emulation' in detect_enabled_features"
    - role: apps/extra
      tags: extra
    - role: apps/labs
      tags: labs
      when: "'labs' in detect_enabled_features"
    - role: apps/mobile
      tags: mobile
      when: "'mobile' in detect_enabled_features"
    - role: apps/media
      tags: media
    - role: apps/downloader
      tags: downloader
    - role: apps/communication
      tags: communication
    - role: apps/mihon
      tags: mihon
    - role: apps/localsend
      tags: localsend
    - role: apps/office
      tags: office
    - role: apps/rclone
      tags: rclone
    - role: apps/syncthing
      tags: syncthing
    - role: apps/cli
      tags: cli
    - role: apps/vscode
      tags: vscode

    # user
    - role: user/ssh
      tags: ssh
    - role: user/gpg
      tags: gpg
    - role: user/bin
      tags: bin
    - role: user/shell
      tags: shell
    - role: user/xdg
      tags: xdg
    - role: user/dotfiles
      tags: dotfiles
