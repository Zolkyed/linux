# vim:ft=kitty

## name:     Catppuccin Kitty Mocha
## author:   Catppuccin Org
## license:  MIT
## upstream: https://github.com/catppuccin/kitty/blob/main/themes/mocha.conf
## blurb:    Soothing pastel theme for the high-spirited!

# --------------------------------------------------
# -- FONT ------------------------------------------
# --------------------------------------------------
font_family JetBrains Mono Nerd Font

# --------------------------------------------------
# -- COLORS ----------------------------------------
# --------------------------------------------------
# The basic colors
foreground              #cdd6f4
background              #1e1e2e
selection_foreground    #1e1e2e
selection_background    #f5e0dc

# Cursor colors
cursor                  #f5e0dc
cursor_text_color       #1e1e2e

# Scrollbar colors
scrollbar_handle_color  #9399b2
scrollbar_track_color   #45475a

# URL color when hovering with mouse
url_color               #f5e0dc

# Kitty window border colors
active_border_color     #b4befe
inactive_border_color   #6c7086
bell_border_color       #f9e2af

# OS Window titlebar colors
wayland_titlebar_color system
macos_titlebar_color system

# Tab bar colors
active_tab_foreground   #11111b
active_tab_background   #cba6f7
inactive_tab_foreground #cdd6f4
inactive_tab_background #181825
tab_bar_background      #11111b

# Colors for marks (marked text in the terminal)
mark1_foreground #1e1e2e
mark1_background #b4befe
mark2_foreground #1e1e2e
mark2_background #cba6f7
mark3_foreground #1e1e2e
mark3_background #74c7ec

# The 16 terminal colors

# black
color0 #45475a
color8 #585b70

# red
color1 #f38ba8
color9 #f38ba8

# green
color2  #a6e3a1
color10 #a6e3a1

# yellow
color3  #f9e2af
color11 #f9e2af

# blue
color4  #89b4fa
color12 #89b4fa

# magenta
color5  #f5c2e7
color13 #f5c2e7

# cyan
color6  #94e2d5
color14 #94e2d5

# white
color7  #bac2de
color15 #a6adc8

# --------------------------------------------------
# -- APPEARANCE & UI -------------------------------
# --------------------------------------------------
cursor_shape          block
cursor_blink_interval 0.5
window_margin_width   5
enabled_layouts       splits, stack, tall

# --------------------------------------------------
# -- FUNCTIONALITY ---------------------------------
# --------------------------------------------------
scrollback_lines     10000
copy_on_select       yes
strip_trailing_spaces smart
shell_integration    enabled
linux_display_server x11
confirm_os_window_close 0
allow_remote_control yes
listen_on            unix:/tmp/kitty

# --------------------------------------------------
# -- TAB BAR ---------------------------------------
# --------------------------------------------------
tab_bar_min_tabs       1
tab_bar_edge           bottom
tab_bar_style          powerline
tab_powerline_style    slanted
tab_title_template     {title}{' :{}:'.format(num_windows) if num_windows > 1 else ''}

# --------------------------------------------------
# -- KEYMAPS ---------------------------------------
# --------------------------------------------------
map ctrl+shift+u open_url_with_default_browser
map ctrl+shift+k clear_terminal scrollback active

# font size
map ctrl+equal       change_font_size all +1.0
map ctrl+shift+equal change_font_size all +1.0
map ctrl+minus       change_font_size all -1.0
map ctrl+shift+minus change_font_size all -1.0
map ctrl+0           change_font_size all 0
map ctrl+shift+0     change_font_size all 0

# tabs
map ctrl+t     new_tab_with_cwd
map ctrl+w     close_tab
map ctrl+left  previous_tab
map ctrl+right next_tab
map ctrl+1     goto_tab 1
map ctrl+2     goto_tab 2
map ctrl+3     goto_tab 3
map ctrl+4     goto_tab 4
map ctrl+5     goto_tab 5
map ctrl+6     goto_tab 6
map ctrl+7     goto_tab 7
map ctrl+8     goto_tab 8
map ctrl+9     goto_tab 9

# panes
map alt+-      launch --location=hsplit
map alt+\      launch --location=vsplit
map alt+w      close_window
map alt+left   neighboring_window left
map alt+right  neighboring_window right
map alt+up     neighboring_window up
map alt+down   neighboring_window down
