"GitHub" = " ¾░èñ "
"vaults" = " ¾░é║ "
"personal" = " ¾░øô "
".config" = "´éà "

[cmd_duration]
min_time = 10
format = '¾░Ñö [$duration](bold fg:mauve)'
show_milliseconds = true

[c]
