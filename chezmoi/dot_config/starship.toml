# Get editor completions based on the config schema
"$schema" = 'https://starship.rs/config-schema.json'

palette = "catppuccin_mocha"

format = """
$os\
$username\
$shell\
$hostname\
$fill\
$time
$directory\
$git_branch$git_status$git_state$git_commit\
$lua\
$c\
$cpp\
$cmake\
$rust\
$golang\
$nodejs\
$php\
$ruby\
$python\
$character
"""

right_format = """
$cmd_duration 
"""

add_newline = true

[fill]
symbol = ' '
style = 'bold green'

[time]
disabled = false
time_format = "%R"
style = "fg:lavender"
format = '[´É║  $time ]($style)'

[os]
disabled = false
style = "bold blue"

[username]
show_always = true
style_user = "bold fg:blue"
style_root = "bold fg:red"
format = '[$user]($style)'

[shell]
fish_indicator = '¾░╗┤ '  
style = 'fg:teal italic bold'
format = ' [running](bold fg:teal italic) [$fish_indicator]($style)'
disabled = false

[hostname]
ssh_only = false
format = '[on](bold italic fg:mauve) [$hostname](bold fg:mauve) '
trim_at = '.companyname.com'
disabled = false

[character]
success_symbol = "[ ¯®▒ ´üï](bold fg:blue)"
error_symbol = "[ ´Çì ´üï](bold fg:red)"
vimcmd_symbol = "[ ´é®](bold fg:green)"

[git_branch]
format = "[ [\\[$symbol$branch](fg:sky) |](fg:sapphire)"
symbol = "¯¥á "

[git_status]
format = " $all_status$ahead_behind[\\]](fg:sky)"
conflicted = "="
ahead = "[´äé ${count} ](green)"
behind = "[´äâ ${count} ](red) "
diverged = "[´ëì ${ahead_count} Ôçú${behind_count} ](teal)"
up_to_date = "[¾░ä© ](bold green)"
untracked = "[´è£ ${count} ](maroon)"
stashed = "[¾░Åû ](bold green)"
modified = "[´ôÆ ${count} ](yellow)"
staged = "[´ôÉ ${count} ](green)"
renamed = "[´ôò ${count} ](peach)"
deleted = "[´ôû ${count} ](bold red)"

[git_commit]
format = "[\\($hash\\)]($style) [\\($tag\\)]($style)"
style = "green"

[git_state]
rebase = "REBASING"
merge = "MERGING"
revert = "REVERTING"
cherry_pick = "CHERRY-PICKING"
bisect = "BISECTING"
am = "AM"
am_or_rebase = "AM/REBASE"
style = "yellow"
format = '\([$state( $progress_current/$progress_total)]($style)\) '

[directory]
home_symbol = " ´æ¡ "
read_only = " ´æû "
style = "fg:blue "
fish_style_pwd_dir_length = 2
format = '[¾░ëï $path ]($style)'

[directory.substitutions]
"Desktop" = " ´Æ® "
"Documents" = " ´ÆÑ "
"Downloads" = " ´Éë "
"Music" = " ¾░Äê "
"Pictures" = " ´ÉÅ "
