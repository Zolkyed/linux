# Linux GPU output: Vulkan works with both Wayland and X11 through mpv's
# automatic context selection. Hardware decoding remains driver-agnostic.
profile=high-quality
vo=gpu-next
hwdec=auto-safe
gpu-api=vulkan
gpu-context=auto

scale=ewa_lanczos
cscale=ewa_lanczos
dscale=mitchell

dither-depth = 8
